services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snackflow
      POSTGRES_PASSWORD: snackflow
      POSTGRES_DB: snackflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snackflow -d snackflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://snackflow:snackflow@postgres:5432/snackflow
      JWT_SECRET: local-dev-secret
      JWT_EXPIRY_MINUTES: 720
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      AUTO_CREATE_TABLES: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev -- -H 0.0.0.0
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
